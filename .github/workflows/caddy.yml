name: Caddy

on:
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "caddy/**"
      - "scripts/**"
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/caddy
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  check-updates:
    name: Check for updates
    if: github.event_name != 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for new releases
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/check-updates.sh

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add caddy/versions.json caddy/Dockerfile
          git commit -m "$COMMIT_MSG"
          git push

  build:
    name: Build and publish
    runs-on: ubuntu-latest
    needs: [check-updates]
    if: always() && (github.event_name == 'push' || needs.check-updates.outputs.has_changes == 'true')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Read version
        id: version
        run: |
          VERSION=$(grep 'ARG CADDY_VERSION' caddy/Dockerfile | sed -nre 's/^[^0-9]*(([0-9]+\.)*[0-9]+).*/\1/p')
          echo "caddy=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        uses: docker/metadata-action@v5
        id: metadata
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.version.outputs.caddy }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.version.outputs.caddy }}
            type=semver,pattern={{major}},value=v${{ steps.version.outputs.caddy }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./caddy
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: ${{ env.PLATFORMS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
